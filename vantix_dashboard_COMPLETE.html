<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - Vantix Bio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .metric-card:hover {
            transform: translateY(-4px);
        }

        .metric-label {
            font-size: 14px;
            font-weight: 600;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 36px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
        }

        .metric-change {
            font-size: 13px;
            font-weight: 600;
        }

        .metric-change.positive {
            color: #48bb78;
        }

        .metric-change.negative {
            color: #f56565;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .chart-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 20px;
        }

        .products-table {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px;
            background: #f7fafc;
            font-weight: 600;
            color: #4a5568;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #2d3748;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: white;
        }

        @media (max-width: 768px) {
            .metrics-grid,
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Vantix Bio Analytics</h1>
            <button class="refresh-btn" onclick="loadDashboard()">↻ Refresh</button>
        </div>

        <div id="loading" class="loading">Loading analytics...</div>

        <div id="dashboard" style="display: none;">
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Total Revenue</div>
                    <div class="metric-value" id="totalRevenue">$0</div>
                    <div class="metric-change" id="revenueChange"></div>
                </div>

                <div class="metric-card">
                    <div class="metric-label">This Month</div>
                    <div class="metric-value" id="thisMonth">$0</div>
                    <div class="metric-change positive" id="monthGrowth"></div>
                </div>

                <div class="metric-card">
                    <div class="metric-label">Total Orders</div>
                    <div class="metric-value" id="totalOrders">0</div>
                </div>

                <div class="metric-card">
                    <div class="metric-label">Avg Order Value</div>
                    <div class="metric-value" id="avgOrder">$0</div>
                </div>

                <div class="metric-card">
                    <div class="metric-label">Today</div>
                    <div class="metric-value" id="todayRevenue">$0</div>
                    <div class="metric-change" id="todayChange"></div>
                </div>

                <div class="metric-card">
                    <div class="metric-label">Last 7 Days</div>
                    <div class="metric-value" id="last7Days">$0</div>
                    <div class="metric-change" id="last7DaysChange"></div>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-title">Revenue Timeline</div>
                    <canvas id="revenueChart"></canvas>
                </div>

                <div class="chart-card">
                    <div class="chart-title">Payment Methods</div>
                    <canvas id="paymentChart"></canvas>
                </div>
            </div>

            <div class="products-table">
                <div class="chart-title">Top 10 Products</div>
                <table id="productsTable">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Product</th>
                            <th>Units Sold</th>
                        </tr>
                    </thead>
                    <tbody id="productsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // UPDATE THIS WITH YOUR APPS SCRIPT URL
        const API_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

        let revenueChart, paymentChart;

        async function loadDashboard() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';

                const response = await fetch(API_URL + '?action=dashboard');
                const data = await response.json();

                // Update metrics
                document.getElementById('totalRevenue').textContent = '$' + data.totalRevenue.toFixed(2);
                document.getElementById('totalOrders').textContent = data.totalOrders;
                document.getElementById('avgOrder').textContent = '$' + data.avgOrderValue.toFixed(2);
                
                // Today metrics
                document.getElementById('todayRevenue').textContent = '$' + data.today.revenue.toFixed(2);
                const todayChange = data.today.vsYesterday;
                const todayEl = document.getElementById('todayChange');
                todayEl.textContent = (todayChange > 0 ? '↑' : '↓') + ' ' + Math.abs(todayChange).toFixed(1) + '% vs yesterday';
                todayEl.className = 'metric-change ' + (todayChange >= 0 ? 'positive' : 'negative');

                // Last 7 days
                document.getElementById('last7Days').textContent = '$' + data.last7Days.revenue.toFixed(2);
                const last7Change = data.last7Days.vsPrev7Days;
                const last7El = document.getElementById('last7DaysChange');
                last7El.textContent = (last7Change > 0 ? '↑' : '↓') + ' ' + Math.abs(last7Change).toFixed(1) + '% vs prev 7 days';
                last7El.className = 'metric-change ' + (last7Change >= 0 ? 'positive' : 'negative');

                // Revenue chart
                updateRevenueChart(data.dailyRevenue);

                // Payment chart
                updatePaymentChart(data.paymentMethods);

                // Products table
                updateProductsTable(data.topProducts);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('loading').textContent = 'Error loading data. Check console.';
            }
        }

        function updateRevenueChart(dailyData) {
            const ctx = document.getElementById('revenueChart');
            
            // Sort dates
            const sortedDates = Object.keys(dailyData).sort();
            const last30Days = sortedDates.slice(-30);
            const revenues = last30Days.map(date => dailyData[date]);

            if (revenueChart) {
                revenueChart.destroy();
            }

            revenueChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last30Days.map(d => d.slice(5)), // MM-DD format
                    datasets: [{
                        label: 'Revenue',
                        data: revenues,
                        borderColor: 'rgb(102, 126, 234)',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: value => '$' + value
                            }
                        }
                    }
                }
            });
        }

        function updatePaymentChart(paymentData) {
            const ctx = document.getElementById('paymentChart');
            
            const methods = Object.keys(paymentData);
            const amounts = Object.values(paymentData);

            if (paymentChart) {
                paymentChart.destroy();
            }

            paymentChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: methods,
                    datasets: [{
                        data: amounts,
                        backgroundColor: [
                            'rgb(102, 126, 234)',
                            'rgb(118, 75, 162)',
                            'rgb(237, 100, 166)',
                            'rgb(255, 154, 158)'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function updateProductsTable(productsData) {
            const tbody = document.getElementById('productsBody');
            tbody.innerHTML = '';

            // Sort by quantity
            const sorted = Object.entries(productsData)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            sorted.forEach((item, index) => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = index + 1;
                row.insertCell(1).textContent = item[0];
                row.insertCell(2).textContent = item[1];
            });
        }

        // Auto-refresh every 5 minutes
        setInterval(loadDashboard, 300000);

        // Initial load
        loadDashboard();
    </script>
</body>
</html>
