<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantix Bio Batch QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
        }
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .qr-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .qr-card h3 {
            margin: 0 0 8px 0;
            color: #1a1a2e;
            font-size: 18px;
        }
        .batch-id {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #0066cc;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .qr-wrapper {
            width: 200px;
            height: 200px;
            margin: 0 auto 16px;
            padding: 16px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qr-wrapper img {
            width: 200px;
            height: 200px;
            image-rendering: crisp-edges;
        }
        .download-btn {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .download-btn:hover {
            background: #0052a3;
        }
        .download-all {
            text-align: center;
            margin: 30px 0;
        }
        .download-all-btn {
            background: #00cc66;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .download-all-btn:hover {
            background: #00a352;
        }
        .size-note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 16px;
            margin: 20px 0;
            border-radius: 4px;
        }
        .size-note strong {
            color: #856404;
        }
    </style>
</head>
<body>
    <h1>🧬 Vantix Bio - Batch 001 QR Codes</h1>
    <p class="subtitle">March 2026 Launch - First Production Batch (10 Products)</p>
    
    <div class="size-note">
        <strong>📏 Print Size Recommendation:</strong> 4-5cm × 4-5cm (1.6-2 inches) for easy scanning. Minimum: 2.5cm.
        <br><strong>Resolution:</strong> 600×600 pixels (high quality for professional printing)
    </div>

    <div class="download-all">
        <button class="download-all-btn" onclick="downloadAllQRCodes()">⬇️ Download All QR Codes (10 PNGs)</button>
    </div>

    <div class="qr-grid" id="qrGrid"></div>

    <script>
        const products = [
            { name: 'BPC-157 10mg', batchId: 'VX-BPC10-001' },
            { name: 'TB-500 10mg', batchId: 'VX-TB10-001' },
            { name: 'CJC-1295 10mg', batchId: 'VX-CJC10-001' },
            { name: 'Ipamorelin 5mg', batchId: 'VX-IPA5-001' },
            { name: 'MOTS-C 10mg', batchId: 'VX-MOTS10-001' },
            { name: 'NAD+ 1000mg', batchId: 'VX-NAD1K-001' },
            { name: 'GHK-Cu 100mg', batchId: 'VX-GHK100-001' },
            { name: 'Semaglutide 10mg', batchId: 'VX-SEMA10-001' },
            { name: 'Tirzepatide 30mg', batchId: 'VX-TIRZ30-001' },
            { name: 'Retatrutide 20mg', batchId: 'VX-RETA20-001' }
        ];

        const qrGrid = document.getElementById('qrGrid');

        products.forEach((product, index) => {
            const card = document.createElement('div');
            card.className = 'qr-card';
            card.id = `card-${index}`;

            const verifyUrl = `https://vantixbio.com/verify.html?batch=${product.batchId}`;

            card.innerHTML = `
                <h3>${product.name}</h3>
                <div class="batch-id">${product.batchId}</div>
                <div class="qr-wrapper" id="qr-wrapper-${index}"></div>
                <button class="download-btn" onclick="downloadQR(${index}, '${product.batchId}')">
                    Download PNG
                </button>
            `;

            qrGrid.appendChild(card);

            // Generate QR code with explicit size
            const qrDiv = document.createElement('div');
            qrDiv.id = `qr-${index}`;
            qrDiv.style.width = '600px';
            qrDiv.style.height = '600px';
            qrDiv.style.display = 'none';
            document.body.appendChild(qrDiv);
            
            new QRCode(qrDiv, {
                text: verifyUrl,
                width: 600,
                height: 600,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // Wait for render then copy to visible wrapper
            setTimeout(() => {
                const canvas = qrDiv.querySelector('canvas');
                if (canvas) {
                    const img = document.createElement('img');
                    img.src = canvas.toDataURL('image/png');
                    img.style.width = '200px';
                    img.style.height = '200px';
                    document.getElementById(`qr-wrapper-${index}`).appendChild(img);
                }
            }, 100);
        });

        function downloadQR(index, batchId) {
            const qrDiv = document.getElementById(`qr-${index}`);
            const canvas = qrDiv.querySelector('canvas');
            
            if (canvas) {
                const link = document.createElement('a');
                link.download = `${batchId}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }
        }

        function downloadAllQRCodes() {
            products.forEach((product, index) => {
                setTimeout(() => {
                    downloadQR(index, product.batchId);
                }, index * 500);
            });
        }
    </script>
</body>
</html>
