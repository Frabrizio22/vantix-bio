@import url('https://fonts.cdnfonts.com/css/geist');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF7;--text:#0A1628;--accent:#3973B0;--accent-light:#6FA5D9;--hairline:#E5E5E0;--navy:#143054}
html,body{max-width:100%;overflow-x:hidden;position:relative}
body{font-family:'Geist',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:300;line-height:1.1}
h1{font-size:clamp(2rem,6.5vw,4.5rem);letter-spacing:-.02em}
h2{font-size:clamp(1.75rem,4.5vw,3rem);letter-spacing:-.015em}
.label-mono{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.25em;color:rgba(10,22,40,.5)}
.container{max-width:100%;margin:0 auto;padding:0 20px;box-sizing:border-box}@media(min-width:768px){.container{padding:0 40px;max-width:1400px}}
.status-bar{background:#0F1B2D;padding:8px 0;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(26,41,66,.5)}
.status-inner{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#FAFAF7;display:flex;justify-content:center;align-items:center;gap:8px}
.pulse{width:6px;height:6px;border-radius:50%;background:#7BA88F;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(123,168,143,0.7)}70%{box-shadow:0 0 0 6px rgba(123,168,143,0)}100%{box-shadow:0 0 0 0 rgba(123,168,143,0)}}
.header-nav{padding:12px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--hairline)}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);flex-shrink:0}
.header-icons{display:flex;align-items:center;gap:8px}
.icon-btn{background:none;border:none;padding:6px;cursor:pointer;color:var(--navy);display:flex;align-items:center;justify-content:center;transition:opacity .2s;flex-shrink:0}
.icon-btn:hover{opacity:.6}
.icon-btn svg{width:22px;height:22px;stroke-width:1.8;stroke:currentColor}
.btn{padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;border:none;text-decoration:none;display:inline-block;white-space:nowrap}
.btn-dark{background:var(--navy);color:#fff}
.btn-dark:hover{background:var(--accent)}
.hero{padding:60px 0 40px;border-bottom:1px solid var(--hairline)}
.chapter{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.25em;color:var(--accent);margin-bottom:24px;display:flex;align-items:center;gap:12px}
.chapter::before{content:'';width:24px;height:1px;background:var(--accent)}
.filters{display:flex;gap:24px;padding:20px 0;border-bottom:1px solid var(--hairline);font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.15em;overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:37px;background:var(--bg);z-index:50;scrollbar-width:none;-ms-overflow-style:none}
.filters::-webkit-scrollbar{display:none}
.filter-item{color:rgba(10,22,40,.5);cursor:pointer;white-space:nowrap;transition:color .3s;position:relative}
.filter-item:hover,.filter-item.active{color:var(--accent)}
.filter-item.active::after{content:'';position:absolute;bottom:-21px;left:0;right:0;height:2px;background:var(--accent)}
.products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:60px}@media(min-width:768px){.products-grid{gap:20px}}@media(min-width:1024px){.products-grid{grid-template-columns:repeat(3,1fr)}}
.product-card{background:#fff;border:1px solid var(--hairline);border-radius:12px;padding:12px;transition:all .3s;position:relative;cursor:pointer}@media(min-width:768px){.product-card{padding:24px}}

.oos-label{font-family:'JetBrains Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.15em;color:rgba(10,22,40,.5);text-align:center;padding:4px 0;border-top:1px solid var(--hairline);margin-bottom:8px}

/* Waitlist Modal */
.waitlist-modal{position:fixed;inset:0;background:rgba(10,22,40,.8);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.waitlist-modal.active{display:flex}

.waitlist-modal-close:hover{opacity:1}

.waitlist-modal p{color:rgba(10,22,40,.7);margin-bottom:24px;line-height:1.6}
.waitlist-form{display:flex;flex-direction:column;gap:12px}
.waitlist-input{padding:14px 16px;border:1px solid var(--hairline);border-radius:10px;font-size:15px;font-family:'Geist',sans-serif}
.waitlist-input:focus{outline:none;border-color:var(--accent)}
.waitlist-submit{padding:14px 24px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .3s}
.waitlist-submit:hover{background:var(--accent)}
.waitlist-success{display:none;text-align:center;padding:20px}
.waitlist-success.active{display:block}
.waitlist-success svg{width:48px;height:48px;color:var(--accent);margin-bottom:16px}
.nav-links{display:none}@media(min-width:1024px){.nav-links{display:flex;gap:32px;align-items:center}}
.nav-links a{position:relative;color:var(--text);text-decoration:none;font-size:15px;font-weight:500;transition:color .3s}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--accent);transition:width .3s}
.nav-links a:hover::after{width:100%}
.nav-item{position:relative}
.catalog-link{display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--text);font-size:15px;font-weight:500}
.catalog-link svg{width:14px;height:14px;transition:transform .2s;stroke:currentColor;stroke-width:2}
.nav-item:hover .catalog-link svg{transform:rotate(180deg)}
.nav-dropdown{position:absolute;top:100%;left:0;background:#fff;border:1px solid var(--hairline);border-radius:8px;padding:8px 0;min-width:180px;opacity:0;pointer-events:none;transform:translateY(-8px);transition:all .2s;box-shadow:0 4px 12px rgba(0,0,0,.08);z-index:100}
.nav-item:hover .nav-dropdown{opacity:1;pointer-events:auto;transform:translateY(0)}
.nav-dropdown a{display:block;padding:10px 16px;color:var(--text);text-decoration:none;font-size:14px;transition:background .2s;font-weight:500}
.nav-dropdown a:hover{background:var(--bg)}
.nav-dropdown a::after{display:none}
.menu-overlay{position:fixed;inset:0;top:0;left:0;right:0;bottom:0;background:#FAFAF7;z-index:10000;opacity:0;pointer-events:none;transition:opacity .3s;overflow-y:auto;display:none}
