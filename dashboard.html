<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantix Bio — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050812;--card:#0a1020;--border:#1a2340;--accent:#60a5fa;--green:#34d399;--red:#f87171;--yellow:#fbbf24;--text:#e2e8f0;--muted:#64748b;--font:'Geist',sans-serif;--mono:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}

/* Password Gate */
#gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.gate-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 40px;max-width:400px;width:90%;text-align:center}
.gate-box h1{font-family:var(--mono);font-size:14px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:32px}
.gate-box input{width:100%;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;outline:none;margin-bottom:16px}
.gate-box input:focus{border-color:var(--accent)}
.gate-box button{width:100%;padding:14px;background:var(--accent);color:var(--bg);border:none;border-radius:8px;font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.gate-box button:hover{opacity:.9}
.gate-error{color:var(--red);font-size:12px;margin-top:8px;display:none}

/* Dashboard */
#dashboard{display:none;padding:20px;max-width:1400px;margin:0 auto}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.dash-header h1{font-family:var(--mono);font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--accent)}
.dash-header .updated{font-family:var(--mono);font-size:11px;color:var(--muted)}
.month-filter{display:flex;gap:8px;align-items:center;margin-bottom:24px}
.month-filter select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-family:var(--mono);font-size:12px}

/* Metric Cards */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.metric .label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px}
.metric .value{font-family:var(--mono);font-size:28px;font-weight:600;color:var(--text)}
.metric .sub{font-family:var(--mono);font-size:11px;margin-top:6px}
.metric .up{color:var(--green)}
.metric .down{color:var(--red)}
.metric .neutral{color:var(--muted)}

/* Sections */
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.section h2{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}}

/* Tables */
table{width:100%;border-collapse:collapse}
th{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
td{font-family:var(--mono);font-size:13px;padding:10px 12px;border-bottom:1px solid rgba(26,35,64,.5)}
tr:hover td{background:rgba(96,165,250,.03)}

/* Payment bars */
.bar-container{display:flex;height:32px;border-radius:6px;overflow:hidden;margin-top:12px}
.bar{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--bg);min-width:40px}
.bar.cc{background:var(--accent)}
.bar.zelle{background:var(--green)}
.bar.crypto{background:var(--yellow)}

/* Status badges */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.badge.paid{background:rgba(52,211,153,.15);color:var(--green)}
.badge.shipped{background:rgba(96,165,250,.15);color:var(--accent)}
.badge.delivered{background:rgba(52,211,153,.25);color:var(--green)}
.badge.pending{background:rgba(251,191,36,.15);color:var(--yellow)}
.badge.cancelled{background:rgba(248,113,113,.15);color:var(--red)}

/* Revenue chart */
.chart-bar{display:flex;align-items:flex-end;gap:8px;height:120px;margin-top:12px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-col .bar-fill{width:100%;background:var(--accent);border-radius:4px 4px 0 0;min-height:2px;transition:height .5s}
.chart-col .bar-label{font-family:var(--mono);font-size:9px;color:var(--muted)}
.chart-col .bar-value{font-family:var(--mono);font-size:9px;color:var(--text)}

/* Loading */
.loading{text-align:center;padding:60px;font-family:var(--mono);font-size:12px;color:var(--muted)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Password Gate -->
<div id="gate">
  <div class="gate-box">
    <h1>Vantix Bio</h1>
    <input type="password" id="passInput" placeholder="Dashboard Password" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Access Dashboard</button>
    <div class="gate-error" id="gateError">Invalid password</div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="dash-header">
    <h1>Vantix Bio — Operations</h1>
    <div>
      <span class="updated" id="lastUpdated"></span>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div><br>Loading dashboard...
  </div>

  <div id="dashContent" style="display:none">
    <!-- Top Metrics -->
    <div class="metrics" id="metricsGrid"></div>

    <div class="grid-2">
      <!-- Revenue Chart -->
      <div class="section">
        <h2>Monthly Revenue</h2>
        <div class="chart-bar" id="revenueChart"></div>
      </div>

      <!-- Payment Breakdown -->
      <div class="section">
        <h2>Payment Methods</h2>
        <div id="paymentBreakdown"></div>
        <div class="bar-container" id="paymentBar"></div>
      </div>
    </div>

    <div class="grid-2">
      <!-- Top Products -->
      <div class="section">
        <h2>Top Products</h2>
        <table><thead><tr><th>Product</th><th style="text-align:right">Units Sold</th></tr></thead><tbody id="productsTable"></tbody></table>
      </div>

      <!-- Top Customers -->
      <div class="section">
        <h2>Top Customers</h2>
        <table><thead><tr><th>Customer</th><th style="text-align:right">Orders</th><th style="text-align:right">Spent</th></tr></thead><tbody id="customersTable"></tbody></table>
      </div>
    </div>

    <!-- Recent Orders -->
    <div class="section">
      <h2>Recent Orders</h2>
      <table>
        <thead><tr><th>Date</th><th>Order</th><th>Customer</th><th>Items</th><th style="text-align:right">Total</th><th style="text-align:right">Profit</th><th>Status</th></tr></thead>
        <tbody id="ordersTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// IMPORTANT: Replace this URL after deploying the Apps Script
const API_URL = 'PASTE_YOUR_APPS_SCRIPT_URL_HERE';
let dashPassword = '';

function login() {
  dashPassword = document.getElementById('passInput').value;
  document.getElementById('gateError').style.display = 'none';
  
  fetch(API_URL + '?password=' + encodeURIComponent(dashPassword))
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        document.getElementById('gateError').style.display = 'block';
        return;
      }
      sessionStorage.setItem('vxDashPass', dashPassword);
      document.getElementById('gate').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderDashboard(data);
    })
    .catch(() => {
      document.getElementById('gateError').textContent = 'Connection error';
      document.getElementById('gateError').style.display = 'block';
    });
}

// Auto-login if password saved
window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('vxDashPass');
  if (saved) {
    dashPassword = saved;
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadDashboard();
  }
});

function loadDashboard() {
  fetch(API_URL + '?password=' + encodeURIComponent(dashPassword))
    .then(r => r.json())
    .then(data => {
      if (data.error) { sessionStorage.removeItem('vxDashPass'); location.reload(); return; }
      renderDashboard(data);
    });
}

function fmt(n) { return '$' + parseFloat(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function growthClass(v) { return v > 0 ? 'up' : v < 0 ? 'down' : 'neutral'; }
function growthArrow(v) { return v > 0 ? '↑' : v < 0 ? '↓' : '→'; }

function renderDashboard(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('dashContent').style.display = 'block';
  
  const m = data.metrics;
  document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date(data.lastUpdated).toLocaleString();
  
  // Metrics
  document.getElementById('metricsGrid').innerHTML = `
    <div class="metric">
      <div class="label">Total Revenue</div>
      <div class="value">${fmt(m.totalRevenue)}</div>
      <div class="sub neutral">${m.totalOrders} orders</div>
    </div>
    <div class="metric">
      <div class="label">This Month</div>
      <div class="value">${fmt(m.thisMonthRevenue)}</div>
      <div class="sub ${growthClass(m.monthlyGrowth)}">${growthArrow(m.monthlyGrowth)} ${Math.abs(m.monthlyGrowth)}% vs last month</div>
    </div>
    <div class="metric">
      <div class="label">Last 7 Days</div>
      <div class="value">${fmt(m.last7Revenue)}</div>
      <div class="sub ${growthClass(m.weeklyGrowth)}">${growthArrow(m.weeklyGrowth)} ${Math.abs(m.weeklyGrowth)}% vs prior week</div>
    </div>
    <div class="metric">
      <div class="label">Today</div>
      <div class="value">${fmt(m.todayRevenue)}</div>
      <div class="sub neutral">${m.todayOrders} orders · ${fmt(m.todayProfit)} profit</div>
    </div>
    <div class="metric">
      <div class="label">Net Profit</div>
      <div class="value">${fmt(m.totalNetProfit)}</div>
      <div class="sub neutral">${m.netMargin}% margin</div>
    </div>
    <div class="metric">
      <div class="label">Avg Order Value</div>
      <div class="value">${fmt(m.avgOrderValue)}</div>
      <div class="sub neutral">COGS: ${fmt(m.totalCOGS)} · Fees: ${fmt(m.totalCCFees)}</div>
    </div>
  `;
  
  // Revenue Chart
  const months = data.revenueByMonth || [];
  const maxRev = Math.max(...months.map(m => m.revenue), 1);
  document.getElementById('revenueChart').innerHTML = months.map(m => {
    const h = Math.max((m.revenue / maxRev) * 100, 2);
    const label = m.month.split('-')[1];
    const monthNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `<div class="chart-col">
      <div class="bar-value">${fmt(m.revenue)}</div>
      <div class="bar-fill" style="height:${h}px"></div>
      <div class="bar-label">${monthNames[parseInt(label)]}</div>
    </div>`;
  }).join('');
  
  // Payment Breakdown
  const pb = data.paymentBreakdown;
  const payTotal = (pb.credit_card?.total||0) + (pb.zelle?.total||0) + (pb.crypto?.total||0);
  const ccPct = payTotal > 0 ? ((pb.credit_card?.total||0) / payTotal * 100).toFixed(0) : 0;
  const zPct = payTotal > 0 ? ((pb.zelle?.total||0) / payTotal * 100).toFixed(0) : 0;
  const crPct = payTotal > 0 ? ((pb.crypto?.total||0) / payTotal * 100).toFixed(0) : 0;
  
  document.getElementById('paymentBreakdown').innerHTML = `
    <table>
      <tr><td style="color:var(--accent)">● Credit Card</td><td style="text-align:right">${fmt(pb.credit_card?.total||0)}</td><td style="text-align:right;color:var(--muted)">${pb.credit_card?.count||0} orders</td></tr>
      <tr><td style="color:var(--green)">● Zelle</td><td style="text-align:right">${fmt(pb.zelle?.total||0)}</td><td style="text-align:right;color:var(--muted)">${pb.zelle?.count||0} orders</td></tr>
      <tr><td style="color:var(--yellow)">● Crypto</td><td style="text-align:right">${fmt(pb.crypto?.total||0)}</td><td style="text-align:right;color:var(--muted)">${pb.crypto?.count||0} orders</td></tr>
    </table>
  `;
  document.getElementById('paymentBar').innerHTML = `
    ${ccPct > 0 ? `<div class="bar cc" style="width:${ccPct}%">${ccPct}%</div>` : ''}
    ${zPct > 0 ? `<div class="bar zelle" style="width:${zPct}%">${zPct}%</div>` : ''}
    ${crPct > 0 ? `<div class="bar crypto" style="width:${crPct}%">${crPct}%</div>` : ''}
  `;
  
  // Products
  document.getElementById('productsTable').innerHTML = (data.topProducts||[]).map(p =>
    `<tr><td>${p.name}</td><td style="text-align:right">${p.count}</td></tr>`
  ).join('');
  
  // Customers
  document.getElementById('customersTable').innerHTML = (data.topCustomers||[]).map(c =>
    `<tr><td>${c.name}</td><td style="text-align:right">${c.orders}</td><td style="text-align:right">${fmt(c.spent)}</td></tr>`
  ).join('');
  
  // Recent Orders
  document.getElementById('ordersTable').innerHTML = (data.recentOrders||[]).map(o => {
    const d = new Date(o.date);
    const dateStr = isNaN(d) ? o.date : (d.getMonth()+1)+'/'+d.getDate();
    const statusClass = o.status.toLowerCase().replace(/\s/g,'');
    return `<tr>
      <td>${dateStr}</td>
      <td>${o.orderNum}</td>
      <td>${o.customer}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.items}</td>
      <td style="text-align:right">${fmt(o.total)}</td>
      <td style="text-align:right;color:var(--green)">${fmt(o.profit)}</td>
      <td><span class="badge ${statusClass}">${o.status}</span></td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
