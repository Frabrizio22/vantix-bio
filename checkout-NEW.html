<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Vantix Bio</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BBBNSQT84M"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-BBBNSQT84M');</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f8f8f8;padding:20px;padding-bottom:120px}
.container{max-width:600px;margin:0 auto;background:white;border-radius:12px;padding:30px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
h1{font-size:28px;margin-bottom:24px;color:#0A1628}
.cart-item{background:#f8f8f8;padding:16px;margin:12px 0;border-radius:8px;display:flex;justify-content:space-between;align-items:center}
.item-info{flex:1}
.item-name{font-size:16px;font-weight:600;margin-bottom:4px}
.item-price{font-size:14px;color:#666}
.item-qty{display:flex;align-items:center;gap:10px}
.qty-btn{background:#2563eb;color:white;border:none;width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:18px}
.qty-btn:hover{background:#1d4ed8}
.qty-display{min-width:30px;text-align:center;font-weight:600}
.remove-btn{background:#ef4444;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;margin-left:10px}
.empty{text-align:center;padding:60px 20px;color:#999}
.summary{margin-top:30px;padding-top:20px;border-top:2px solid #e5e5e5}
.summary-row{display:flex;justify-content:space-between;margin:10px 0;font-size:16px}
.summary-row.total{font-size:22px;font-weight:bold;margin-top:16px;padding-top:16px;border-top:1px solid #e5e5e5}
.form-section{margin-top:30px}
.form-section h2{font-size:20px;margin-bottom:16px}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-size:14px;font-weight:600}
.form-group input,.form-group select{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.payment-methods{display:grid;gap:12px;margin:16px 0}
.payment-btn{padding:16px;border:2px solid #ddd;border-radius:8px;background:white;cursor:pointer;text-align:left;transition:all 0.2s}
.payment-btn:hover,.payment-btn.selected{border-color:#2563eb;background:#eff6ff}
.payment-btn .title{font-weight:600;margin-bottom:4px}
.payment-btn .desc{font-size:13px;color:#666}
.submit-btn{width:100%;padding:18px;background:#2563eb;color:white;border:none;border-radius:8px;font-size:18px;font-weight:600;cursor:pointer;margin-top:24px}
.submit-btn:hover{background:#1d4ed8}
.submit-btn:disabled{background:#ccc;cursor:not-allowed}
.instructions{background:#fef3c7;border-left:4px solid #f59e0b;padding:16px;border-radius:6px;margin:16px 0}
.instructions h3{font-size:16px;margin-bottom:8px}
.instructions p{font-size:14px;line-height:1.6;margin:4px 0}
</style>
</head>
<body>

<div class="container">
<h1>Checkout</h1>

<div id="cartSection">
<div id="cartItems"></div>
</div>

<div class="summary">
<div class="summary-row">
<span>Subtotal:</span>
<span id="subtotal">$0.00</span>
</div>
<div class="summary-row">
<span>Shipping:</span>
<span id="shipping">$0.00</span>
</div>
<div class="summary-row total">
<span>Total:</span>
<span id="total">$0.00</span>
</div>
</div>

<div class="form-section">
<h2>Contact Information</h2>
<div class="form-group">
<label>Full Name *</label>
<input type="text" id="name" required>
</div>
<div class="form-group">
<label>Email *</label>
<input type="email" id="email" required>
</div>
<div class="form-group">
<label>Phone *</label>
<input type="tel" id="phone" required>
</div>
</div>

<div class="form-section">
<h2>Shipping Address</h2>
<div class="form-group">
<label>Address *</label>
<input type="text" id="address" required>
</div>
<div class="form-group">
<label>City *</label>
<input type="text" id="city" required>
</div>
<div class="form-row">
<div class="form-group">
<label>State *</label>
<input type="text" id="state" required>
</div>
<div class="form-group">
<label>ZIP *</label>
<input type="text" id="zip" required>
</div>
</div>
</div>

<div class="form-section">
<h2>Payment Method</h2>
<div class="payment-methods">
<div class="payment-btn" onclick="selectPayment('zelle')">
<div class="title">💰 Zelle (5% discount)</div>
<div class="desc">Pay with Zelle and save 5%</div>
</div>
<div class="payment-btn" onclick="selectPayment('credit')">
<div class="title">💳 Credit Card</div>
<div class="desc">Pay securely with credit card</div>
</div>
</div>
<div id="paymentInstructions"></div>
</div>

<button class="submit-btn" id="submitBtn" onclick="placeOrder()">Place Order</button>

</div>

<script>
var cart = [];
var selectedPayment = null;
var orderNumber = '';

// Load cart
function loadCart() {
  var saved = localStorage.getItem('vantixCart');
  if (saved) {
    cart = JSON.parse(saved);
  }
}

// Render cart
function renderCart() {
  var container = document.getElementById('cartItems');
  if (cart.length === 0) {
    container.innerHTML = '<div class="empty">Your cart is empty<br><a href="shop.html">Browse Products</a></div>';
    document.getElementById('submitBtn').disabled = true;
    return;
  }
  
  var html = '';
  for (var i = 0; i < cart.length; i++) {
    var item = cart[i];
    html += '<div class="cart-item">';
    html += '<div class="item-info">';
    html += '<div class="item-name">' + item.name + '</div>';
    html += '<div class="item-price">$' + item.price.toFixed(2) + ' × ' + item.quantity + ' = $' + (item.price * item.quantity).toFixed(2) + '</div>';
    html += '</div>';
    html += '<div class="item-qty">';
    html += '<button class="qty-btn" onclick="updateQty(' + i + ',-1)">−</button>';
    html += '<span class="qty-display">' + item.quantity + '</span>';
    html += '<button class="qty-btn" onclick="updateQty(' + i + ',1)">+</button>';
    html += '<button class="remove-btn" onclick="removeItem(' + i + ')">Remove</button>';
    html += '</div></div>';
  }
  container.innerHTML = html;
  updateSummary();
}

// Update quantity
function updateQty(index, change) {
  cart[index].quantity += change;
  if (cart[index].quantity < 1) cart[index].quantity = 1;
  localStorage.setItem('vantixCart', JSON.stringify(cart));
  renderCart();
}

// Remove item
function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem('vantixCart', JSON.stringify(cart));
  renderCart();
}

// Calculate totals
function getSubtotal() {
  return cart.reduce(function(sum, item) {
    return sum + (item.price * item.quantity);
  }, 0);
}

function getShipping() {
  var subtotal = getSubtotal();
  return subtotal >= 150 ? 0 : 9.99;
}

function getTotal() {
  var subtotal = getSubtotal();
  var shipping = getShipping();
  var discount = selectedPayment === 'zelle' ? subtotal * 0.05 : 0;
  return subtotal + shipping - discount;
}

// Update summary
function updateSummary() {
  var subtotal = getSubtotal();
  var shipping = getShipping();
  var total = getTotal();
  
  document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
  document.getElementById('shipping').textContent = shipping === 0 ? 'FREE' : '$' + shipping.toFixed(2);
  document.getElementById('total').textContent = '$' + total.toFixed(2);
}

// Select payment
function selectPayment(method) {
  selectedPayment = method;
  document.querySelectorAll('.payment-btn').forEach(function(btn) {
    btn.classList.remove('selected');
  });
  event.target.closest('.payment-btn').classList.add('selected');
  
  var instructions = document.getElementById('paymentInstructions');
  if (method === 'zelle') {
    instructions.innerHTML = '<div class="instructions"><h3>Zelle Payment Instructions</h3><p>Send payment to: <strong>vantixbio@gmail.com</strong></p><p>Include order number in memo after placing order.</p></div>';
  } else {
    instructions.innerHTML = '';
  }
  
  updateSummary();
}

// Generate order number
function generateOrderNumber() {
  var date = new Date();
  var timestamp = date.getTime().toString().slice(-6);
  return 'VX' + timestamp;
}

// Place order
function placeOrder() {
  if (cart.length === 0) {
    alert('Your cart is empty');
    return;
  }
  
  if (!selectedPayment) {
    alert('Please select a payment method');
    return;
  }
  
  var name = document.getElementById('name').value;
  var email = document.getElementById('email').value;
  var phone = document.getElementById('phone').value;
  var address = document.getElementById('address').value;
  var city = document.getElementById('city').value;
  var state = document.getElementById('state').value;
  var zip = document.getElementById('zip').value;
  
  if (!name || !email || !phone || !address || !city || !state || !zip) {
    alert('Please fill in all required fields');
    return;
  }
  
  orderNumber = generateOrderNumber();
  
  var orderData = {
    order_number: orderNumber,
    customer_name: name,
    customer_email: email,
    phone: phone,
    address: address + ', ' + city + ', ' + state + ' ' + zip,
    city: city,
    state: state,
    zip: zip,
    items: cart,
    subtotal: getSubtotal(),
    shipping: getShipping(),
    total: getTotal(),
    payment_method: selectedPayment === 'zelle' ? 'Zelle' : 'Credit Card',
    payment_status: 'Pending'
  };
  
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = 'Processing...';
  
  // Submit to Cloudflare Worker
  fetch('https://vantix-checkout.prcpeptides.workers.dev', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(orderData)
  })
  .then(function(response) { return response.json(); })
  .then(function(data) {
    if (data.status === 'success') {
      localStorage.removeItem('vantixCart');
      if (selectedPayment === 'zelle') {
        alert('Order placed! Order #' + orderNumber + '\n\nPlease send $' + getTotal().toFixed(2) + ' via Zelle to vantixbio@gmail.com\n\nInclude order #' + orderNumber + ' in memo.');
        window.location.href = 'shop.html';
      } else {
        window.location.href = data.redirect_url;
      }
    } else {
      alert('Error: ' + data.message);
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = 'Place Order';
    }
  })
  .catch(function(error) {
    alert('Error submitting order. Please try again.');
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Place Order';
  });
}

// Initialize
loadCart();
renderCart();
</script>

</body>
</html>
