<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {
            font-family: 'Poppins';
            font-weight: 600;
            src: local('Poppins SemiBold'), local('Poppins-SemiBold');
        }
        @font-face {
            font-family: 'Poppins';
            font-weight: 500;
            src: local('Poppins Medium'), local('Poppins-Medium');
        }
        
        body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 630px;
            overflow: hidden;
        }
        
        .og-card {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0F172A 0%, #1E3A5F 50%, #2C4F7F 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* Subtle grid pattern overlay */
        .og-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        
        .logo-container {
            position: relative;
            z-index: 2;
            margin-bottom: 40px;
        }
        
        .logo-container img {
            width: 400px;
            height: auto;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.3));
        }
        
        .tagline {
            position: relative;
            z-index: 2;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 32px;
            font-weight: 600;
            color: #FFFFFF;
            text-align: center;
            letter-spacing: 0.5px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.4);
        }
        
        .tagline-accent {
            color: #60A5FA;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="og-card">
        <div class="logo-container">
            <img src="logo-full.svg" alt="Vantix Bio">
        </div>
        <div class="tagline">
            Janoshik-Verified <span class="tagline-accent">•</span> Forensic-Grade Research Peptides
        </div>
    </div>
</body>
</html>
