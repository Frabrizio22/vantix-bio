<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <!-- Background -->
  <rect width="800" height="800" fill="#FAFAF7"/>
  
  <!-- Grid pattern (subtle) -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E5DFD0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="800" fill="url(#grid)" opacity="0.4"/>
  
  <!-- Center content -->
  <g transform="translate(400, 400)">
    <!-- Circular border -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#0F1B2D" stroke-width="1.5" opacity="0.15"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#3973B0" stroke-width="1" stroke-dasharray="8 4" opacity="0.3"/>
    
    <!-- Icon (beaker/flask) -->
    <g transform="translate(0, -20)">
      <path d="M -30 -40 L -30 0 L -50 60 Q -50 80 -30 80 L 30 80 Q 50 80 50 60 L 30 0 L 30 -40 Z" 
            fill="none" stroke="#3973B0" stroke-width="2" stroke-linejoin="round"/>
      <line x1="-30" y1="-40" x2="30" y2="-40" stroke="#3973B0" stroke-width="2" stroke-linecap="round"/>
      <path d="M -40 50 Q 0 40 40 50" fill="none" stroke="#7BA88F" stroke-width="1.5" opacity="0.6"/>
    </g>
    
    <!-- Text -->
    <text x="0" y="100" font-family="JetBrains Mono, monospace" font-size="11" 
          letter-spacing="2" fill="#0F1B2D" opacity="0.5" text-anchor="middle">
      IMAGE COMING SOON
    </text>
    
    <text x="0" y="125" font-family="Fraunces, serif" font-size="16" 
          fill="#0F1B2D" opacity="0.7" text-anchor="middle" font-style="italic">
      Awaiting Photography
    </text>
  </g>
  
  <!-- Corner brackets (instrumental vibe) -->
  <path d="M 40 40 L 40 80 M 40 40 L 80 40" stroke="#0F1B2D" stroke-width="1" opacity="0.15"/>
  <path d="M 760 40 L 760 80 M 760 40 L 720 40" stroke="#0F1B2D" stroke-width="1" opacity="0.15"/>
  <path d="M 40 760 L 40 720 M 40 760 L 80 760" stroke="#0F1B2D" stroke-width="1" opacity="0.15"/>
  <path d="M 760 760 L 760 720 M 760 760 L 720 760" stroke="#0F1B2D" stroke-width="1" opacity="0.15"/>
</svg>
