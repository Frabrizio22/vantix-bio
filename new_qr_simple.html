<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>New Batch QR Codes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial; max-width: 1000px; margin: 40px auto; padding: 20px; }
        h1 { color: #1E3A5F; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; margin-top: 30px; }
        .item { text-align: center; padding: 20px; background: #f5f5f5; border-radius: 8px; }
        .item h3 { margin: 0 0 10px 0; color: #333; }
        .item p { margin: 5px 0; font-size: 13px; color: #666; font-family: monospace; }
        #qr1, #qr2, #qr3, #qr4 { display: inline-block; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Vantix Bio — New Batch QR Codes</h1>
    <p>Right-click each QR code and "Save Image As..." to download.</p>
    
    <div class="grid">
        <div class="item">
            <h3>Retatrutide 20mg</h3>
            <p>Batch 2: VX-RETA20-002</p>
            <div id="qr1"></div>
        </div>
        
        <div class="item">
            <h3>Tesamorelin 10mg</h3>
            <p>Batch 1: VX-TESA10-001</p>
            <div id="qr2"></div>
        </div>
        
        <div class="item">
            <h3>Melanotan II 10mg</h3>
            <p>Batch 1: VX-MT210-001</p>
            <div id="qr3"></div>
        </div>
        
        <div class="item">
            <h3>AOD-9604 10mg</h3>
            <p>Batch 1: VX-AOD10-001</p>
            <div id="qr4"></div>
        </div>
    </div>

    <script>
        new QRCode(document.getElementById("qr1"), {
            text: "https://vantixbio.com/verify.html?batch=VX-RETA20-002",
            width: 300,
            height: 300
        });
        
        new QRCode(document.getElementById("qr2"), {
            text: "https://vantixbio.com/verify.html?batch=VX-TESA10-001",
            width: 300,
            height: 300
        });
        
        new QRCode(document.getElementById("qr3"), {
            text: "https://vantixbio.com/verify.html?batch=VX-MT210-001",
            width: 300,
            height: 300
        });
        
        new QRCode(document.getElementById("qr4"), {
            text: "https://vantixbio.com/verify.html?batch=VX-AOD10-001",
            width: 300,
            height: 300
        });
    </script>
</body>
</html>
