<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Generate OG Image</title>
</head>
<body>
<canvas id="canvas" width="1200" height="630"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Background - clean white
ctx.fillStyle = '#FFFFFF';
ctx.fillRect(0, 0, 1200, 630);

// Navy border for definition
ctx.strokeStyle = '#0F1B2D';
ctx.lineWidth = 2;
ctx.strokeRect(1, 1, 1198, 628);

// Logo text - centered, large
ctx.fillStyle = '#0F1B2D';
ctx.font = 'bold 140px -apple-system, sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';

// VX in large letters
ctx.fillText('VX', 600, 250);

// VANTIX BIO below
ctx.font = '600 52px -apple-system, sans-serif';
ctx.fillText('VANTIX BIO', 600, 380);

// Tagline
ctx.font = '400 28px -apple-system, sans-serif';
ctx.fillStyle = '#64748B';
ctx.fillText('Batch-Level Janoshik Verification', 600, 480);

// Small accent line
ctx.strokeStyle = '#6FA5D9';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.moveTo(400, 340);
ctx.lineTo(800, 340);
ctx.stroke();

// Download
const link = document.createElement('a');
link.download = 'vantix-og-image.jpg';
link.href = canvas.toDataURL('image/jpeg', 0.95);
link.click();
console.log('Downloaded vantix-og-image.jpg');
</script>
<p>Image downloaded as vantix-og-image.jpg</p>
</body>
</html>
