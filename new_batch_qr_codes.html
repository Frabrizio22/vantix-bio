<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Batch QR Codes - Vantix Bio</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #1E3A5F; margin-top: 0; }
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            font-size: 14px;
            color: #0d47a1;
        }
        button {
            background: #1E3A5F;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover { background: #2C4F7F; }
        #status {
            margin-top: 20px;
            padding: 15px;
            background: #f0f9ff;
            border-left: 4px solid #1E3A5F;
            border-radius: 4px;
            display: none;
        }
        .qr-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .qr-item {
            text-align: center;
            padding: 10px;
            background: #f9fafb;
            border-radius: 6px;
        }
        .qr-item canvas {
            max-width: 100%;
            height: auto;
        }
        .qr-item p {
            margin: 8px 0 0 0;
            font-size: 12px;
            color: #666;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vantix Bio — New Batch QR Codes</h1>
        <p>Generate QR codes for 4 new batches</p>
        
        <div class="info">
            📦 <strong>For ANIK (Label Maker):</strong> These 4 QR codes go on labels for:<br>
            • Retatrutide 20mg Batch 2<br>
            • Tesamorelin 10mg Batch 1<br>
            • Melanotan II 10mg Batch 1<br>
            • AOD-9604 10mg Batch 1
        </div>
        
        <button onclick="generateAndDownloadAll()">Generate & Download All 4 QR Codes</button>
        
        <div id="status"></div>
        <div id="preview" class="qr-preview"></div>
    </div>

    <script>
        const batches = [
            { id: 'VX-RETA20-002', name: 'Retatrutide-20mg-Batch2' },
            { id: 'VX-TESA10-001', name: 'Tesamorelin-10mg-Batch1' },
            { id: 'VX-MT210-001', name: 'Melanotan-II-10mg-Batch1' },
            { id: 'VX-AOD10-001', name: 'AOD-9604-10mg-Batch1' }
        ];

        async function generateAndDownloadAll() {
            const status = document.getElementById('status');
            const preview = document.getElementById('preview');
            status.style.display = 'block';
            status.innerHTML = 'Generating QR codes...';
            preview.innerHTML = '';

            for (let i = 0; i < batches.length; i++) {
                const batch = batches[i];
                const url = `https://vantixbio.com/verify.html?batch=${batch.id}`;
                
                // Create canvas
                const canvas = document.createElement('canvas');
                
                // Generate QR code
                await QRCode.toCanvas(canvas, url, {
                    width: 600,
                    margin: 1,
                    color: {
                        dark: '#000000',
                        light: '#FFFFFF'
                    }
                });

                // Add to preview
                const item = document.createElement('div');
                item.className = 'qr-item';
                const previewCanvas = canvas.cloneNode(true);
                previewCanvas.style.width = '150px';
                previewCanvas.style.height = '150px';
                item.appendChild(previewCanvas);
                const label = document.createElement('p');
                label.textContent = batch.id;
                item.appendChild(label);
                preview.appendChild(item);

                // Download
                const link = document.createElement('a');
                link.download = `${batch.name}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();

                status.innerHTML = `Generated ${i + 1}/${batches.length}: ${batch.id}`;
                
                // Small delay between downloads
                await new Promise(resolve => setTimeout(resolve, 300));
            }

            status.innerHTML = `✅ All ${batches.length} QR codes generated and downloaded!`;
        }
    </script>
</body>
</html>
