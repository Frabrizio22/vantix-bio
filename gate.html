<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="logo-icon.svg">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WRJYBCQRL9"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-WRJYBCQRL9');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Use Only — VANTIX BIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-navy: #1A2B44;
            --font-heading: 'Space Grotesk', 'Inter', sans-serif;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: #F8FAFC;
            color: var(--color-navy);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        .gate-container {
            background: #FFFFFF;
            max-width: 420px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(26, 43, 68, 0.1);
            padding: 24px 20px;
            text-align: center;
        }

        .logo {
            height: 60px;
            width: auto;
            margin: 0 auto 16px;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            color: #1A2B44;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .disclaimer {
            font-size: 12px;
            color: #64748B;
            line-height: 1.5;
            margin-bottom: 16px;
            text-align: left;
            background: #F8FAFC;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #2563EB;
        }

        .disclaimer strong {
            color: #1A2B44;
            font-weight: 600;
        }

        .checkbox-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
            padding: 12px;
            background: #F8FAFC;
            border-radius: 6px;
            border: 1px solid #E2E8F0;
            transition: all 0.2s;
        }

        .checkbox-item:hover {
            background: #EFF6FF;
            border-color: #DBEAFE;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 1px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #2563EB;
        }

        .checkbox-item label {
            font-size: 13px;
            color: #1A2B44;
            cursor: pointer;
            font-weight: 500;
            line-height: 1.4;
        }

        .checkbox-item label a {
            color: #2563EB;
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-item label a:hover {
            text-decoration: underline;
        }

        .remember-group {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            justify-content: center;
        }

        .remember-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #2563EB;
        }

        .remember-group label {
            font-size: 12px;
            color: #64748B;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .btn {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: #2563EB;
            color: #FFFFFF;
        }

        .btn-primary:hover:not(:disabled) {
            background: #1D4ED8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:disabled {
            background: #E2E8F0;
            color: #94A3B8;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #FFFFFF;
            color: #64748B;
            border: 2px solid #E2E8F0;
        }

        .btn-secondary:hover {
            background: #F8FAFC;
            border-color: #CBD5E1;
        }

        .footer-note {
            font-size: 10px;
            color: #94A3B8;
            line-height: 1.4;
        }

        @media (max-width: 640px) {
            .gate-container {
                padding: 20px 16px;
            }

            h1 {
                font-size: 20px;
            }

            .logo {
                height: 50px;
            }

            .btn {
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="gate-container">
        <img src="logo-header.svg" alt="Vantix Bio" class="logo" style="height:44px;width:auto">
        <h1>Research Use Only</h1>
        
        <div class="disclaimer">
            <strong>Research Use Only:</strong> All products are research-grade materials for in vitro laboratory use. Not for human/animal consumption or medical use. Not FDA-approved.
        </div>

        <div class="checkbox-group">
            <div class="checkbox-item">
                <input type="checkbox" id="ageCheck" />
                <label for="ageCheck">I confirm I am <strong>21 years of age or older</strong></label>
            </div>

            <div class="checkbox-item">
                <input type="checkbox" id="termsCheck" />
                <label for="termsCheck">I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a></label>
            </div>
        </div>

        <div class="remember-group">
            <input type="checkbox" id="rememberCheck" checked />
            <label for="rememberCheck">Remember me on this device</label>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" id="enterBtn" disabled>Enter Site</button>
            <button class="btn btn-secondary" id="exitBtn">Exit</button>
        </div>

        <div class="footer-note">
            By entering, you acknowledge qualified researcher status and legitimate research use only.
        </div>
    </div>

    <script>
        (function() {
            const ageCheck = document.getElementById('ageCheck');
            const termsCheck = document.getElementById('termsCheck');
            const rememberCheck = document.getElementById('rememberCheck');
            const enterBtn = document.getElementById('enterBtn');
            const exitBtn = document.getElementById('exitBtn');

            // Update button state
            function updateButtonState() {
                enterBtn.disabled = !(ageCheck.checked && termsCheck.checked);
            }

            ageCheck.addEventListener('change', updateButtonState);
            termsCheck.addEventListener('change', updateButtonState);

            // Enter site
            enterBtn.addEventListener('click', function() {
                if (!ageCheck.checked || !termsCheck.checked) return;

                const timestamp = Date.now();
                const data = JSON.stringify({ accepted: true, timestamp: timestamp });

                if (rememberCheck.checked) {
                    // Persist across sessions
                    localStorage.setItem('vantix_gate_accepted', data);
                } else {
                    // Session only
                    sessionStorage.setItem('vantix_gate_accepted', data);
                }

                // Redirect to shop
                window.location.href = 'shop.html';
            });

            // Exit
            exitBtn.addEventListener('click', function() {
                window.location.href = 'https://www.google.com';
            });

            // If already accepted, skip gate
            const localAccepted = localStorage.getItem('vantix_gate_accepted');
            const sessionAccepted = sessionStorage.getItem('vantix_gate_accepted');
            
            if (localAccepted || sessionAccepted) {
                try {
                    const data = JSON.parse(localAccepted || sessionAccepted);
                    if (data && data.accepted) {
                        // Already accepted, redirect immediately
                        window.location.href = 'shop.html';
                    }
                } catch (e) {
                    // Invalid data, show gate
                }
            }
        })();
    </script>
</body>
</html>
