<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc"/>
  
  <!-- Grid lines -->
  <line x1="80" y1="320" x2="720" y2="320" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="80" y1="260" x2="720" y2="260" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="80" y1="200" x2="720" y2="200" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="80" y1="140" x2="720" y2="140" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="80" y1="80" x2="720" y2="80" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="2,2"/>
  
  <!-- Axes -->
  <line x1="80" y1="50" x2="80" y2="320" stroke="#1e293b" stroke-width="2"/>
  <line x1="80" y1="320" x2="720" y2="320" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Baseline (with slight noise) -->
  <path d="M 80 318 L 100 317 L 120 319 L 140 318 L 160 317 L 180 318 L 200 319 L 220 318" 
        stroke="#3b82f6" stroke-width="1.5" fill="none"/>
  
  <!-- Small void volume peak (2 min) -->
  <path d="M 220 318 L 230 315 L 240 310 L 245 308 L 250 310 L 260 315 L 270 318" 
        stroke="#3b82f6" stroke-width="1.5" fill="none"/>
  
  <!-- Baseline continues -->
  <path d="M 270 318 L 290 317 L 310 319 L 330 318 L 350 317 L 370 318 L 390 319 L 410 318" 
        stroke="#3b82f6" stroke-width="1.5" fill="none"/>
  
  <!-- Main peak (14.2 min) - tall and sharp -->
  <path d="M 410 318 
           L 420 310 
           L 430 290 
           L 440 250 
           L 450 180 
           L 460 100 
           L 470 60 
           L 480 55 
           L 490 60 
           L 500 100 
           L 510 180 
           L 520 250 
           L 530 290 
           L 540 310 
           L 550 318" 
        stroke="#3b82f6" stroke-width="2" fill="none"/>
  
  <!-- Baseline after main peak -->
  <path d="M 550 318 L 570 317 L 590 319 L 610 318 L 630 317" 
        stroke="#3b82f6" stroke-width="1.5" fill="none"/>
  
  <!-- Small impurity peak (18 min) -->
  <path d="M 630 318 L 640 315 L 650 308 L 655 305 L 660 308 L 670 315 L 680 318" 
        stroke="#3b82f6" stroke-width="1.5" fill="none"/>
  
  <!-- Final baseline -->
  <path d="M 680 318 L 700 317 L 720 318" 
        stroke="#3b82f6" stroke-width="1.5" fill="none"/>
  
  <!-- Axis labels -->
  <text x="400" y="355" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#1e293b">
    Retention Time (minutes)
  </text>
  
  <text x="35" y="190" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#1e293b" transform="rotate(-90 35 190)">
    Absorbance (mAU)
  </text>
  
  <!-- Time markers -->
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#64748b">0</text>
  <text x="240" y="340" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#64748b">5</text>
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#64748b">10</text>
  <text x="480" y="340" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#64748b">15</text>
  <text x="640" y="340" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#64748b">20</text>
  
  <!-- Callout arrows and labels -->
  <!-- Void volume peak -->
  <line x1="245" y1="308" x2="245" y2="270" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="245" cy="265" r="3" fill="#ef4444"/>
  <text x="250" y="265" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" font-weight="600">
    Void volume
  </text>
  <text x="250" y="280" font-family="Arial, sans-serif" font-size="11" fill="#64748b">
    (salts/polar impurities)
  </text>
  
  <!-- Main peak -->
  <line x1="480" y1="55" x2="530" y2="30" stroke="#059669" stroke-width="2"/>
  <circle cx="535" cy="28" r="4" fill="#059669"/>
  <text x="545" y="25" font-family="Arial, sans-serif" font-size="14" fill="#059669" font-weight="700">
    Main Peak (99.2%)
  </text>
  <text x="545" y="40" font-family="Arial, sans-serif" font-size="11" fill="#64748b">
    Target peptide
  </text>
  
  <!-- Impurity peak -->
  <line x1="655" y1="305" x2="680" y2="280" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="683" cy="277" r="3" fill="#f59e0b"/>
  <text x="688" y="277" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" font-weight="600">
    Impurity (0.8%)
  </text>
  <text x="688" y="292" font-family="Arial, sans-serif" font-size="11" fill="#64748b">
    Deletion sequence
  </text>
  
  <!-- Baseline label -->
  <line x1="150" y1="318" x2="150" y2="335" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="155" y="350" font-family="Arial, sans-serif" font-size="11" fill="#64748b">
    Stable baseline
  </text>
  
  <!-- Purity label in corner -->
  <rect x="600" y="60" width="110" height="50" fill="white" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="655" y="78" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1e293b" font-weight="600">
    HPLC Purity
  </text>
  <text x="655" y="98" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#059669" font-weight="700">
    99.2%
  </text>
</svg>
