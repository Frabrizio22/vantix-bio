<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Debug</title>
<style>
body{font-family:monospace;padding:0;margin:0;background:#000;color:#0f0;font-size:12px}
.debug{position:fixed;top:0;left:0;right:0;bottom:50%;background:#000;border-bottom:2px solid #0f0;overflow-y:auto;padding:10px}
.checkout{position:fixed;top:50%;left:0;right:0;bottom:0;background:#1a1a1a;overflow-y:auto}
.log{padding:3px 0;border-bottom:1px solid #003300}
.cart-display{background:#000;padding:15px;margin:10px;border:1px solid #0f0;border-radius:4px}
button{padding:10px 20px;margin:10px 5px;background:#0f0;color:#000;border:none;border-radius:4px;cursor:pointer;font-weight:bold}
</style>
</head>
<body>

<div class="debug" id="debug">
<h3 style="margin:0 0 10px 0">🔍 Debug Log</h3>
<div id="logs"></div>
</div>

<div class="checkout">
<div style="padding:20px;text-align:center">
<h2 style="color:#0f0;margin-bottom:20px">Checkout Debug Mode</h2>
<button onclick="simulateCart()">Add Test Item to Cart</button>
<button onclick="loadAndRender()">Load & Render Cart</button>
<button onclick="clearStorage()">Clear Storage</button>
</div>

<div class="cart-display">
<strong>Cart Array Contents:</strong>
<pre id="cartContents" style="color:#0f0;margin:10px 0">[]</pre>
</div>

<div class="cart-display">
<strong>LocalStorage vantixCart:</strong>
<pre id="storageContents" style="color:#0f0;margin:10px 0">null</pre>
</div>

<div class="cart-display">
<strong>Rendered Cart HTML:</strong>
<div id="cartItems" style="background:#111;padding:10px;min-height:100px;border:1px dashed #0f0;margin-top:10px"></div>
</div>
</div>

<script>
var cart = [];
var outOfStock = ['5-Amino-1MQ 50mg', 'AOD-9604 2mg', 'DSIP 2mg', 'KPV 10mg'];

function log(msg) {
  const logs = document.getElementById('logs');
  const time = new Date().toLocaleTimeString();
  logs.innerHTML += `<div class="log">[${time}] ${msg}</div>`;
  logs.scrollTop = logs.scrollHeight;
}

function updateDisplay() {
  document.getElementById('cartContents').textContent = JSON.stringify(cart, null, 2);
  document.getElementById('storageContents').textContent = localStorage.getItem('vantixCart') || 'null';
}

function simulateCart() {
  cart = [{
    name: 'Semaglutide 10mg',
    sku: 'VX-SEMA-10',
    price: 47,
    quantity: 1
  }];
  localStorage.setItem('vantixCart', JSON.stringify(cart));
  log('✅ Added Semaglutide to cart and localStorage');
  updateDisplay();
}

function loadCart() {
  log('📥 Loading cart from localStorage...');
  var saved = localStorage.getItem('vantixCart');
  log('Raw saved value: ' + (saved ? saved.substring(0, 100) : 'null'));
  
  if (saved) {
    try {
      cart = JSON.parse(saved);
      log('✅ Parsed cart, length: ' + cart.length);
    } catch(e) {
      log('❌ Parse error: ' + e.message);
      return;
    }
  } else {
    log('⚠️ No saved cart found');
    cart = [];
  }
  
  // Filter out of stock
  log('🔍 Checking for out-of-stock items...');
  var removedItems = [];
  var before = cart.length;
  cart = cart.filter(function(item) {
    if (outOfStock.indexOf(item.name) !== -1) {
      removedItems.push(item.name);
      return false;
    }
    return true;
  });
  log('Filtered: ' + before + ' → ' + cart.length + ' items');
  if (removedItems.length > 0) {
    log('⚠️ Removed: ' + removedItems.join(', '));
  }
  
  updateDisplay();
}

function renderCart() {
  log('🎨 Rendering cart...');
  var container = document.getElementById('cartItems');
  
  if (!container) {
    log('❌ ERROR: cartItems element not found!');
    return;
  }
  
  if (cart.length === 0) {
    log('⚠️ Cart is empty, showing empty message');
    container.innerHTML = '<div style="color:#ff0;padding:20px;text-align:center">Your cart is empty</div>';
    return;
  }
  
  log('✅ Rendering ' + cart.length + ' items');
  var html = '';
  for (var i = 0; i < cart.length; i++) {
    var item = cart[i];
    html += '<div style="background:#003300;padding:10px;margin:5px 0;border-radius:4px">';
    html += '<div style="color:#0f0;font-size:14px;font-weight:bold">' + item.name + '</div>';
    html += '<div style="color:#0a0;font-size:12px">Price: $' + item.price + ' × ' + item.quantity + ' = $' + (item.price * item.quantity).toFixed(2) + '</div>';
    html += '</div>';
  }
  container.innerHTML = html;
  log('✅ Render complete');
}

function loadAndRender() {
  loadCart();
  renderCart();
}

function clearStorage() {
  localStorage.clear();
  cart = [];
  log('🗑️ Storage cleared');
  updateDisplay();
  renderCart();
}

// Auto-load on page load
log('🚀 Page loaded, auto-loading cart...');
loadAndRender();
</script>
</body>
</html>
